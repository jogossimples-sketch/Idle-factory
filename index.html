<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Tycoon - Henrique</title>
    <style>
        /* DESIGN MANTIDO E MELHORADO */
        body { 
            background-color: #333; 
            color: white; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            user-select: none;
        }
        
        #header { 
            background: #444; 
            width: 100%; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 4px solid #edb900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        #money-text { 
            color: #ffd700; 
            font-size: 28px; 
            font-weight: bold; 
            text-shadow: 2px 2px #000;
        }

        /* CONTAINER PARA ALINHAR RANKING À ESQUERDA */
        #game-container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            max-width: 95vw;
        }

        /* ESTILO DO RANKING */
        #leaderboard {
            background: #222;
            border: 3px solid #444;
            border-radius: 10px;
            padding: 15px;
            width: 150px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #leaderboard h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #edb900;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            padding: 4px;
            background: #333;
            border-radius: 4px;
        }

        .rank-name { color: #ccc; }
        .rank-val { color: #ffd700; font-weight: bold; }
        .rank-me { border: 1px solid #edb900; background: #444; }

        /* GRADE DA FÁBRICA (MANTIDA) */
        #factory-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 115px); 
            gap: 15px; 
            background: #222;
            padding: 20px;
            border-radius: 15px;
            border: 5px solid #444;
        }

        .worker-slot {
            width: 110px;
            height: 165px;
            background: #555;
            border: 3px solid #777;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .locked { background: #444; opacity: 0.7; cursor: pointer; }

        .progress-bar {
            width: 85%;
            height: 12px;
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid #000;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #4caf50, #8bc34a);
        }

        .up-btn {
            background: #edb900;
            border: none;
            color: #222;
            font-weight: bold;
            font-size: 10px;
            padding: 6px;
            width: 90%;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }

        .up-btn:active { transform: scale(0.9); }

        .price-tag { font-size: 11px; color: #ffd700; font-weight: bold; margin-top: 5px; }
        .item-icon { font-size: 35px; }
        .label { font-size: 9px; color: #aaa; margin-bottom: 2px; }

        #reset {
            margin: 20px 0;
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* AJUSTE PARA CELULAR */
        @media (max-width: 600px) {
            #game-container { flex-direction: column; align-items: center; }
            #leaderboard { width: 90%; }
        }
    </style>
</head>
<body>

    <div id="header">
        💰 $<span id="money-text">0</span>
    </div>

    <div id="game-container">
        <div id="leaderboard">
            <h3>🏆 RANKING</h3>
            <div id="rank-items">
                <div class="rank-item"><span class="rank-name">1. Bot_Z</span><span class="rank-val">$5k</span></div>
                <div class="rank-item"><span class="rank-name">2. Bot_Y</span><span class="rank-val">$1k</span></div>
                <div class="rank-item rank-me"><span class="rank-name">Vocé</span><span class="rank-val" id="rank-money">$0</span></div>
            </div>
        </div>

        <div id="factory-grid">
            <div class="worker-slot" id="slot-1">
                <div class="item-icon">💀</div>
                <div class="label">TRABALHADOR 1</div>
                <div class="progress-bar"><div id="fill-1" class="progress-fill"></div></div>
                <button class="up-btn" onclick="upgrade(1)">UP: $<span id="cost-1">20</span></button>
            </div>
            
            <div class="worker-slot locked" id="slot-2" onclick="comprar(2, 50)">
                <div id="content-2" style="text-align:center">
                    <span>🔒</span>
                    <div class="price-tag">$50</div>
                </div>
            </div>

            <div class="worker-slot locked" id="slot-3" onclick="comprar(3, 150)">
                <div id="content-3" style="text-align:center">
                    <span>🔒</span>
                    <div class="price-tag">$150</div>
                </div>
            </div>
        </div>
    </div>

    <button id="reset" onclick="resetar()">Resetar Progresso</button>

    <script>
        // LÓGICA DO JOGO MANTIDA
        let money = 0;
        let workers = {
            1: { active: true, progress: 0, speed: 2, value: 10, upCost: 20 },
            2: { active: false, progress: 0, speed: 1.5, value: 25, upCost: 50 },
            3: { active: false, progress: 0, speed: 1.0, value: 60, upCost: 150 }
        };

        const moneyDisplay = document.getElementById('money-text');
        const rankMoney = document.getElementById('rank-money');

        function salvar() {
            localStorage.setItem('henrique_factory_save', JSON.stringify({ money, workers }));
        }

        function carregar() {
            const save = localStorage.getItem('henrique_factory_save');
            if (save) {
                const data = JSON.parse(save);
                money = data.money;
                workers = data.workers;
                for (let id in workers) {
                    if (workers[id].active) atualizarInterface(id);
                }
                updateMoneyUI();
            }
        }

        function updateMoneyUI() {
            moneyDisplay.innerText = money;
            rankMoney.innerText = "$" + money;
        }

        function comprar(id, preco) {
            if (money >= preco && !workers[id].active) {
                money -= preco;
                workers[id].active = true;
                atualizarInterface(id);
                updateMoneyUI();
                salvar();
            }
        }

        function upgrade(id) {
            let w = workers[id];
            if (money >= w.upCost) {
                money -= w.upCost;
                w.speed += 0.5;
                w.upCost = Math.floor(w.upCost * 1.7);
                document.getElementById(`cost-${id}`).innerText = w.upCost;
                updateMoneyUI();
                salvar();
            }
        }

        function atualizarInterface(id) {
            const slot = document.getElementById(`slot-${id}`);
            const icone = id == 1 ? "💀" : (id == 2 ? "📦" : "🏭");
            slot.classList.remove('locked');
            slot.removeAttribute('onclick');
            slot.innerHTML = `
                <div class="item-icon">${icone}</div>
                <div class="label">TRABALHADOR ${id}</div>
                <div class="progress-bar"><div id="fill-${id}" class="progress-fill"></div></div>
                <button class="up-btn" onclick="upgrade(${id})">UP: $<span id="cost-${id}">${workers[id].upCost}</span></button>
            `;
        }

        function resetar() {
            if(confirm("Deseja resetar o jogo?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function update() {
            for (let id in workers) {
                if (workers[id].active) {
                    workers[id].progress += workers[id].speed;

                    if (workers[id].progress >= 100) {
                        workers[id].progress = 0;
                        money += workers[id].value;
                        updateMoneyUI();
                        if(money % 10 === 0) salvar();
                    }

                    const bar = document.getElementById(`fill-${id}`);
                    if (bar) bar.style.width = workers[id].progress + "%";
                }
            }
            requestAnimationFrame(update);
        }

        carregar();
        update();
    </script>
</body>
    </html>
