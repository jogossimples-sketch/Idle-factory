<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clone de Factory Tycoon</title>
    <style>
        /* Estilo geral inspirado no jogo original */
        body { 
            background-color: #5b5b5b; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            padding: 0;
            user-select: none;
        }
        
        /* Topo com Dinheiro mais robusto */
        #header { 
            background: #222; 
            width: 100%; 
            padding: 15px 0; 
            text-align: left; 
            border-bottom: 5px solid #f2c10d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
        }
        
        #money-container {
            background: #333;
            padding: 5px 20px;
            border-radius: 8px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #money-display { 
            color: #f2c10d; 
            font-size: 28px; 
            font-weight: 900; 
            text-shadow: 2px 2px #000;
        }

        /* Grade da Fábrica como o chão da imagem */
        #factory-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 115px); 
            gap: 20px; 
            margin-top: 40px; 
            background: #4a4a4a;
            padding: 25px;
            border-radius: 15px;
            border: 4px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Estilo de cada "Posto de Trabalho" com efeito 3D */
        .worker-slot {
            width: 110px;
            height: 140px;
            background: #7a7a7a;
            border: 3px solid #333;
            border-radius: 8px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            box-shadow: 0 6px 0 #222; /* Efeito de profundidade */
        }

        /* Barra de Progresso estilizada */
        .progress-bar {
            width: 85%;
            height: 14px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to bottom, #72ff76, #2e8b31);
            border-radius: 20px;
        }

        .item-icon { 
            font-size: 40px; 
            margin-bottom: 5px; 
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.5));
        }

        .worker-label {
            font-size: 11px;
            font-weight: bold;
            color: #eee;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        /* Cadeado estilizado */
        .locked {
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #444 !important;
            border-color: #222 !important;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="money-container">
            <span style="font-size: 24px;">💰</span>
            <span id="money-display">0</span>
        </div>
    </div>

    <div id="factory-grid">
        <div class="worker-slot">
            <div class="item-icon">💀</div>
            <div class="worker-label">TRABALHADOR 1</div>
            <div class="progress-bar">
                <div id="fill-1" class="progress-fill"></div>
            </div>
        </div>
        
        <div class="worker-slot locked">🔒</div>
        <div class="worker-slot locked">🔒</div>
    </div>

    <script>
        // --- SUA LÓGICA ORIGINAL MANTIDA ---
        let money = 0;
        let progress = 0;
        const speed = 2; // quanto maior, mais rápido
        
        function update() {
            progress += speed;
            
            if (progress >= 100) {
                progress = 0;
                money += 10; // Ganha 10 moedas cada vez que a barra enche
                document.getElementById('money-display').innerText = money;
            }
            
            document.getElementById('fill-1').style.width = progress + "%";
            requestAnimationFrame(update);
        }

        update(); // Inicia o loop do jogo
    </script>
</body>
                </html>
