<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon - Ranking Real</title>
    <style>
        body { 
            background-color: #333; color: white; font-family: 'Arial', sans-serif; 
            display: flex; flex-direction: column; align-items: center; margin: 0; user-select: none;
        }
        
        #header { 
            background: #444; width: 100%; padding: 15px; text-align: center; 
            border-bottom: 4px solid #edb900; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        #money-text { color: #ffd700; font-size: 28px; font-weight: bold; text-shadow: 2px 2px #000; }

        #game-container { display: flex; flex-direction: row; align-items: flex-start; gap: 20px; max-width: 95vw; }

        /* RANKING */
        #leaderboard {
            background: #222; border: 3px solid #444; border-radius: 10px; padding: 15px; width: 180px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #leaderboard h3 { margin: 0 0 10px 0; font-size: 14px; color: #edb900; text-align: center; }

        #name-input {
            width: 100%; background: #444; border: 1px solid #666; color: white;
            padding: 5px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; box-sizing: border-box;
        }

        .rank-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; padding: 4px; background: #333; border-radius: 4px; }
        .rank-name { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
        .rank-val { color: #ffd700; font-weight: bold; }

        /* GRADE DA FÁBRICA */
        #factory-grid { 
            display: grid; grid-template-columns: repeat(3, 115px); gap: 15px; 
            background: #222; padding: 20px; border-radius: 15px; border: 5px solid #444;
        }

        .worker-slot {
            width: 110px; height: 165px; background: #555; border: 3px solid #777; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }

        .locked { background: #444; opacity: 0.7; cursor: pointer; }
        .progress-bar { width: 85%; height: 12px; background: #111; border-radius: 6px; overflow: hidden; margin: 10px 0; border: 1px solid #000; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #4caf50, #8bc34a); }
        .up-btn { background: #edb900; border: none; color: #222; font-weight: bold; font-size: 10px; padding: 6px; width: 90%; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .item-icon { font-size: 35px; }
        .label { font-size: 9px; color: #aaa; }

        #reset { margin: 20px 0; background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        @media (max-width: 600px) { #game-container { flex-direction: column; align-items: center; } #leaderboard { width: 90%; } }
    </style>
</head>
<body>

    <div id="header">
        💰 $<span id="money-text">0</span>
    </div>

    <div id="game-container">
        <div id="leaderboard">
            <h3>🏆 RANKING REAL</h3>
            <input type="text" id="name-input" placeholder="Seu Nome..." maxlength="10">
            <div id="rank-items">Carregando...</div>
        </div>

        <div id="factory-grid">
            <div class="worker-slot" id="slot-1">
                <div class="item-icon">💀</div>
                <div class="label">TRABALHADOR 1</div>
                <div class="progress-bar"><div id="fill-1" class="progress-fill"></div></div>
                <button class="up-btn" onclick="upgrade(1)">UP: $<span id="cost-1">20</span></button>
            </div>
            
            <div class="worker-slot locked" id="slot-2" onclick="comprar(2, 50)">
                <div id="content-2" style="text-align:center">
                    <span>🔒</span>
                    <div class="price-tag">$50</div>
                </div>
            </div>

            <div class="worker-slot locked" id="slot-3" onclick="comprar(3, 150)">
                <div id="content-3" style="text-align:center">
                    <span>🔒</span>
                    <div class="price-tag">$150</div>
                </div>
            </div>
        </div>
    </div>

    <button id="reset" onclick="resetar()">Resetar Progresso</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7XXCUkOszo",
            authDomain: "chickentycoon.firebaseapp.com",
            projectId: "chickentycoon",
            storageBucket: "chickentycoon.firebasestorage.app",
            messagingSenderId: "531618471959",
            appId: "1:531618471959:web:3fd8833376511a3573bc52",
            databaseURL: "https://chickentycoon-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // VARIÁVEIS DO JOGO
        window.money = 0;
        window.playerName = localStorage.getItem('factory_name') || "Player";
        document.getElementById('name-input').value = window.playerName;

        window.workers = {
            1: { active: true, progress: 0, speed: 2, value: 10, upCost: 20 },
            2: { active: false, progress: 0, speed: 1.5, value: 25, upCost: 50 },
            3: { active: false, progress: 0, speed: 1.0, value: 60, upCost: 150 }
        };

        const moneyDisplay = document.getElementById('money-text');

        // FIREBASE SYNC
        window.syncFirebase = function() {
            if(window.playerName !== "Player" && window.playerName.trim() !== "") {
                set(ref(db, 'ranking/' + window.playerName), {
                    nome: window.playerName,
                    pontos: window.money
                });
            }
        };

        const rankRef = query(ref(db, 'ranking'), orderByChild('pontos'), limitToLast(5));
        onValue(rankRef, (snapshot) => {
            const data = snapshot.val();
            const rankItems = document.getElementById('rank-items');
            rankItems.innerHTML = "";
            let lista = [];
            for (let id in data) { lista.push(data[id]); }
            lista.sort((a, b) => b.pontos - a.pontos);
            lista.forEach((p, i) => {
                rankItems.innerHTML += `<div class="rank-item"><span class="rank-name">${i+1}. ${p.nome}</span><span class="rank-val">$${p.pontos}</span></div>`;
            });
        });

        document.getElementById('name-input').addEventListener('change', (e) => {
            window.playerName = e.target.value;
            localStorage.setItem('factory_name', window.playerName);
            window.syncFirebase();
        });

        // LÓGICA MANTIDA
        window.salvar = function() {
            localStorage.setItem('henrique_factory_save', JSON.stringify({ money: window.money, workers: window.workers }));
            window.syncFirebase();
        };

        window.carregar = function() {
            const save = localStorage.getItem('henrique_factory_save');
            if (save) {
                const data = JSON.parse(save);
                window.money = data.money;
                window.workers = data.workers;
                for (let id in window.workers) {
                    if (window.workers[id].active) window.atualizarInterface(id);
                }
                moneyDisplay.innerText = window.money;
            }
        };

        window.comprar = function(id, preco) {
            if (window.money >= preco && !window.workers[id].active) {
                window.money -= preco;
                window.workers[id].active = true;
                window.atualizarInterface(id);
                moneyDisplay.innerText = window.money;
                window.salvar();
            }
        };

        window.upgrade = function(id) {
            let w = window.workers[id];
            if (window.money >= w.upCost) {
                window.money -= w.upCost;
                w.speed += 0.5;
                w.upCost = Math.floor(w.upCost * 1.7);
                document.getElementById(`cost-${id}`).innerText = w.upCost;
                moneyDisplay.innerText = window.money;
                window.salvar();
            }
        };

        window.atualizarInterface = function(id) {
            const slot = document.getElementById(`slot-${id}`);
            const icone = id == 1 ? "💀" : (id == 2 ? "📦" : "🏭");
            slot.classList.remove('locked');
            slot.removeAttribute('onclick');
            slot.innerHTML = `
                <div class="item-icon">${icone}</div>
                <div class="label">TRABALHADOR ${id}</div>
                <div class="progress-bar"><div id="fill-${id}" class="progress-fill"></div></div>
                <button class="up-btn" onclick="upgrade(${id})">UP: $<span id="cost-${id}">${window.workers[id].upCost}</span></button>
            `;
        };

        window.resetar = function() {
            if(confirm("Deseja resetar o jogo?")) {
                localStorage.clear();
                location.reload();
            }
        };

        function loop() {
            for (let id in window.workers) {
                if (window.workers[id].active) {
                    window.workers[id].progress += window.workers[id].speed;
                    if (window.workers[id].progress >= 100) {
                        window.workers[id].progress = 0;
                        window.money += window.workers[id].value;
                        moneyDisplay.innerText = window.money;
                        if(window.money % 50 === 0) window.salvar();
                    }
                    const bar = document.getElementById(`fill-${id}`);
                    if (bar) bar.style.width = window.workers[id].progress + "%";
                }
            }
            requestAnimationFrame(loop);
        }

        window.carregar();
        loop();
    </script>
</body>
</html>
